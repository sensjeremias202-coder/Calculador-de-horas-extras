<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Horas Extras</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Calculadora de Horas Extras</h1>
        <p>Adicione os dias trabalhados e calcule o total de horas normais e extras.</p>

        <!-- Configurações de Salário e Turno -->
        <div class="config-section">
            <div class="input-group">
                <label for="salario-hora">Salário por hora (R$):</label>
                <input type="number" id="salario-hora" min="0" step="0.01" required placeholder="Ex: 15.50">
            </div>

            <div class="input-group">
                <label for="turno">Turno:</label>
                <select id="turno" required>
                    <option value="primeiro">Primeiro Turno (44h/semana)</option>
                    <option value="segundo">Segundo Turno (39,60h/semana)</option>
                </select>
            </div>
        </div>

        <!-- Formulário para Adicionar Dia -->
        <form id="add-day-form">
            <div class="input-group">
                <label for="data">Data:</label>
                <input type="date" id="data" required>
            </div>
            <div class="input-group">
                <label for="horas-trabalhadas">Horas trabalhadas:</label>
                <input type="number" id="horas-trabalhadas" min="0" step="0.01" required placeholder="Ex: 10">
            </div>
            <div class="input-group checkbox-group">
                <label>
                    <input type="checkbox" id="feriado"> É feriado?
                </label>
            </div>
            <button type="submit">Adicionar Dia</button>
        </form>

        <!-- Tabela Responsiva -->
        <div class="table-responsive">
            <table id="dias-table">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>H. Trab.</th>
                        <th>Turno</th>
                        <th>Feriado</th>
                        <th>H. Normais</th>
                        <th>H. Extras</th>
                        <th>Valor Extras</th>
                        <th>Total</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="dias-body">
                    <!-- Preenchido pelo JS -->
                </tbody>
            </table>
        </div>

        <!-- Seção de Resultados e Totais -->
        <div id="totais" class="totais" style="display: none;">
            <h2>Resumo Total</h2>
            <p id="total-horas-normais"></p>
            <p id="total-horas-extras"></p>
            <p id="total-valor-extras"></p>
            <p id="total-receber"></p>
            
            <button id="btn-baixar" onclick="baixarRelatorio()">
                💾 Baixar Relatório (Excel/CSV)
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
